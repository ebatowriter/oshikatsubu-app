  var MSG = 'font-family:sans-serif;font-size:13px;color:#55525E;padding:0 26px;text-align:center;line-height:1.9';
  function showBoot(html) { try { var b = document.getElementById("boot"); if (b) { b.innerHTML = html; b.style.pointerEvents = "auto"; } } catch (e) {} }
  window.addEventListener("error", function (e) {
    try {
      /* アプリ内ブラウザ(LINE/Instagram等)や拡張機能が注入するスクリプトのエラーは
         "Script error."(詳細マスク)や外部ファイル名で届く——アプリ自身の問題ではないため無視する。
         bundle.js由来のエラーだけを起動失敗として扱う。 */
      var fn = String((e && e.filename) || "");
      var msg = String((e && e.message) || "");
      var masked = !msg || /^script error\.?$/i.test(msg);
      var ours = fn.indexOf("bundle.js") >= 0;
      if (masked || !ours) return;
      if (!window.__bootErr) window.__bootErr = msg + " @" + fn.split("/").pop() + ":" + (e.lineno || 0);
      if (window.__appStarted) return;
      showBoot('<p style="' + MSG + '">読み込みに失敗しました。<br>お使いのブラウザが古い可能性があります。<br>iOSとSafariを最新版に更新するか、<br>別のブラウザでお試しください。</p>');
    } catch (e2) {}
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    try { if (!window.__bootErr && e && e.reason) window.__bootErr = "promise: " + String(e.reason && (e.reason.message || e.reason)).slice(0, 120); } catch (e2) {}
  });
  setTimeout(function () {
    try {
      if (!document.getElementById("boot")) return; // 正常起動済み
      var err = window.__bootErr ? '<br><span style="font-size:10px;color:#B9B0A4">詳細: ' + String(window.__bootErr).replace(/</g, "&lt;").slice(0, 140) + "</span>" : "";
      showBoot('<p style="' + MSG + '"><b>読み込みに時間がかかっています。</b><br><br>LINEやX(Twitter)の中のブラウザで開いている場合は、<br>画面の共有/メニューボタンから<br><b>「Safariで開く」「他のアプリで開く」</b>を選ぶと開けます。<br><br><a href="javascript:location.reload()" style="display:inline-block;margin-top:6px;padding:10px 22px;border:2px solid #191921;border-radius:12px;background:#191921;color:#fff;font-weight:900;text-decoration:none">再読み込みする</a>' + err + "</p>");
    } catch (e2) {}
  }, 7000);
})();
</script>
<script src="./bundle.js?v=c20bd67e"></script>
</body>
</html>
